<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Thi Đấu - CyberArena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top border-bottom border-secondary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning fs-4" href="index.html">🎮 CyberArena</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Giải đấu</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Đăng ký</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-warning btn-sm text-dark px-3 fw-bold mt-1 mt-lg-0" href="registrations.html">Hồ sơ tuyển thủ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="p-4 bg-black shadow rounded-3 border border-secondary">
                    <h3 class="fw-bold text-warning mb-2">ĐĂNG KÝ THI ĐẤU</h3>
                    <p class="text-muted small mb-4">Vui lòng nhập chính xác Email và tên nhân vật để hệ thống gửi sơ đồ phân cặp đấu.</p>
                    
                    <form id="registration-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-light">Họ và tên / Ingame Nickname</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="student-name" placeholder="Ví dụ: Faker Nguyễn">
                            <div class="invalid-feedback" id="error-name"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-light">Địa chỉ Email liên hệ</label>
                            <input type="email" class="form-control bg-dark text-white border-secondary" id="student-email" placeholder="tuyenthu@gmail.com">
                            <div class="invalid-feedback" id="error-email"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium text-light">Chọn giải đấu tham gia tranh tài</label>
                            <select class="form-select bg-dark text-white border-secondary" id="student-course">
                                </select>
                            <div class="invalid-feedback" id="error-course"></div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-2 shadow">XÁC NHẬN GHI DANH</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
